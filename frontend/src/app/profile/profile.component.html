<div class="profile-page-container">
  <!-- Profile Header/Sidebar -->
  <div class="profile-sidebar">
    <div class="profile-card">
      <img [src]="'assets/avatars/' + user.avatar" alt="Avatar" class="profile-avatar" />
      <div class="profile-info">
        <h2>{{ user.name }}</h2>
        <p class="profile-email">{{ user.email }}</p>
        <div class="profile-meta">
          <span class="role-badge" [class]="'role-' + user.role">{{ user.role | uppercase }}</span>
          <span class="user-id">ID: {{ user.id }}</span>
        </div>
      </div>
      <ng-container *ngIf="isAllowedToDelete">
        <div class="profile-actions">
          <button class="edit-profile-button" (click)="openEditProfileModal()">Edit Profile</button>
          <button class="delete-account-button" (click)="deleteAccount()">Delete Account</button>
        </div>
      </ng-container>
    </div>
  </div>

  <!-- Dashboard Content -->
  <div class="dashboard-wrapper">
    <ng-container *ngIf="showDashboard">
      <app-seller-dashboard *ngIf="isSeller"></app-seller-dashboard>
      <app-client-dashboard *ngIf="isClient"></app-client-dashboard>
    </ng-container>
    <ng-container *ngIf="!showDashboard">
      <div class="no-dashboard-message">
        <p>You are viewing {{ user.name }}'s profile</p>
      </div>
    </ng-container>
  </div>
</div>
